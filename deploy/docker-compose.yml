version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../weights:/app/weights:ro
    environment:
      - MODEL_PATH=weights/best.pt
      - CONFIDENCE_THRESHOLD=0.25

