# Training hyperparameters — Phase 3

training:
  epochs: 200
  batch_size: 16
  imgsz: 640
  optimizer: SGD
  lr0: 0.01
  lrf: 0.01 # cosine anneal to 1% of lr0
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  warmup_momentum: 0.8
  device: "0" # "mps" for Apple Silicon, "0" for CUDA, "cpu" for CPU
  workers: 8
  patience: 50 # early stopping patience
  amp: true # mixed precision

  # 2-stage freeze strategy
  freeze: 10 # backbone layers to freeze in stage 1
  freeze_epochs: 5 # epochs to keep backbone frozen

  # Ultralytics built-in augmentations
  mosaic: 0.5
  mixup: 0.15
  close_mosaic: 20 # disable mosaic for last 20 epochs

  # Loss weights (Ultralytics defaults: box=7.5, cls=0.5, dfl=1.5)
  # Increase cls weight since classification is the real bottleneck
  # Decrease box weight since 90% of bboxes are trivial full-image
  cls: 2.0
  box: 3.0
  dfl: 1.5

  seed: 42

# Inverse-frequency class weights (from train set distribution)
class_weights: [9.2, 18.8, 8.5, 6.4, 10.0, 6.3, 4.8, 21.2, 19.6]

paths:
  data_yaml: configs/data.yaml
  project: runs/train
  name: wastevision_v1

# Offline augmentation multipliers (applied before training)
offline_augmentation:
  default_multiplier: 3
  rare_class_multiplier: 5
  rare_classes: [1, 7, 8]  # food_organics, textile_trash, vegetation

wandb:
  enabled: true
  project: wastevision
  entity: null # set to your W&B team name
