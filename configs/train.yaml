# Training hyperparameters — Phase 3

training:
  epochs: 200
  batch_size: 16
  imgsz: 640
  optimizer: SGD
  lr0: 0.01
  lrf: 0.01          # cosine anneal to 1% of lr0
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  warmup_momentum: 0.8
  device: "mps"       # "mps" for Apple Silicon, "0" for CUDA, "cpu" for CPU
  workers: 8
  patience: 30        # early stopping patience
  amp: true           # mixed precision

  # 2-stage freeze strategy
  freeze: 10          # backbone layers to freeze in stage 1
  freeze_epochs: 5    # epochs to keep backbone frozen

  # Ultralytics built-in augmentations
  mosaic: 1.0
  mixup: 0.15
  close_mosaic: 20    # disable mosaic for last 20 epochs

  seed: 42

# Inverse-frequency class weights (from train set distribution)
class_weights: [9.2, 18.8, 8.5, 6.4, 10.0, 6.3, 4.8, 21.2, 19.6]

paths:
  data_yaml: configs/data.yaml
  project: runs/train
  name: wastevision_v1

wandb:
  enabled: true
  project: wastevision
  entity: null        # set to your W&B team name
